<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill: #202124; }
.title { font-size: 20px; font-weight: 700; }
.axis { stroke: #4b5563; stroke-width: 1.2; }
.grid { stroke: #d1d5db; stroke-width: 1; }
.label { font-size: 12px; }
.small { font-size: 11px; fill: #4b5563; }
</style>
<rect x="0" y="0" width="820" height="520" fill="#ffffff"/>
<text x="410.0" y="32" text-anchor="middle" class="title">Quality vs Context Size</text>
<line x1="90" y1="425.0" x2="780" y2="425.0" class="grid"/>
<text x="78" y="429.0" text-anchor="end" class="small">0.0</text>
<line x1="90" y1="354.0" x2="780" y2="354.0" class="grid"/>
<text x="78" y="358.0" text-anchor="end" class="small">0.2</text>
<line x1="90" y1="283.0" x2="780" y2="283.0" class="grid"/>
<text x="78" y="287.0" text-anchor="end" class="small">0.4</text>
<line x1="90" y1="212.0" x2="780" y2="212.0" class="grid"/>
<text x="78" y="216.0" text-anchor="end" class="small">0.6</text>
<line x1="90" y1="141.0" x2="780" y2="141.0" class="grid"/>
<text x="78" y="145.0" text-anchor="end" class="small">0.8</text>
<line x1="90" y1="70.0" x2="780" y2="70.0" class="grid"/>
