<text x="410.0" y="484" text-anchor="middle" class="label">Average input tokens</text>
<text transform="translate(28 247.5) rotate(-90)" text-anchor="middle" class="label">Exact match</text>
<circle cx="728.9" cy="70.0" r="8" fill="#2f6f4e"/>
